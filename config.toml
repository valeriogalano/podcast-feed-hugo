baseURL = ""
languageCode = "it-it"
title = ""

[params]
  author = ""

  [params.podcast]
    title        = "Hugo Podcast"
    subtitle     = "Subtitle"
    summary      = "Summary"
    authors      = ["Author"]
    email        = "example@example.com"
    image        = "img/podcast-logo.png"

    # URL base del CDN per audio, immagini, trascrizioni e capitoli
    cdn_base_url = "https://cdn.example.com/podcast/"

    # URL con tracking analytics (es. OP3). Se omesso, viene usato cdn_base_url.
    cdn_tracked_base_url = ""

    # GUID univoco del podcast. Generalo su https://podcastindex.org/
    guid = ""

    copyright   = "Copyright"
    category    = "Technology"
    sub_category = ""
    explicit    = "no"
    itunes_type = "episodic"   # "episodic" o "serial"

    # Frequenza di aggiornamento (valore RRULE FREQ): DAILY, WEEKLY, MONTHLY, YEARLY
    updateFrequency = "weekly"

    funding_url  = "https://example.com/funding"
    funding_text = "Buy me a coffee"

[taxonomies]
  tags = "tag"
