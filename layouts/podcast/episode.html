{{- $cdnBase := .Site.Params.Podcast.cdn_base_url | default .Site.Params.Podcast.audio_base_url -}}
{{- $date := dateFormat "02. January 2006" .Date -}}
<p class="post_date pale">{{ $date }}</p>
<h1 class="post_title">{{ .Title }}</h1>
{{- with .Params.subtitle }}<h2 class="post_subtitle">{{ . }}</h2>{{ end -}}
<div class="post_content">
    <audio controls>
        <source src="{{ $cdnBase }}{{ .Params.audio }}" type="audio/mpeg">
    </audio>
    {{ .Content }}
</div>
